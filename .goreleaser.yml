project_name: devclean

before:
  hooks:
    - go mod tidy

builds:
  - id: devclean
    main: ./cmd/devclean
    binary: devclean
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: devclean
    builds:
      - devclean
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: wangweicheng7
    name: devclean-cli
  draft: false
  prerelease: false

changelog:
  use: github

